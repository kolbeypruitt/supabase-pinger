name: Ping Supabase Projects

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping all projects
        env:
          SUPABASE_ANON_KEY_HYMNAL: ${{ secrets.SUPABASE_ANON_KEY_HYMNAL }}
          SUPABASE_ANON_KEY_PROPWALK: ${{ secrets.SUPABASE_ANON_KEY_PROPWALK }}
          SUPABASE_ANON_KEY_SECTION8CASA: ${{ secrets.SUPABASE_ANON_KEY_SECTION8CASA }}
        run: |
          FAILED=0
          TOTAL=0

          while IFS= read -r project; do
            name=$(echo "$project" | jq -r '.name')
            url=$(echo "$project" | jq -r '.url')
            key_secret=$(echo "$project" | jq -r '.keySecret')

            anon_key="${!key_secret}"

            if [ -z "$anon_key" ]; then
              echo "::error::[$name] Secret '$key_secret' not found in repo secrets"
              FAILED=$((FAILED + 1))
              TOTAL=$((TOTAL + 1))
              continue
            fi

            status=$(curl -s -o /dev/null -w "%{http_code}" \
              "${url}/rest/v1/" \
              -H "apikey: ${anon_key}" \
              -H "Authorization: Bearer ${anon_key}")

            TOTAL=$((TOTAL + 1))

            if [ "$status" -eq 200 ]; then
              echo "[$name] OK (HTTP $status)"
            else
              echo "::error::[$name] FAILED (HTTP $status)"
              FAILED=$((FAILED + 1))
            fi
          done < <(jq -c '.[]' config/projects.json)

          echo ""
          echo "--- Summary ---"
          echo "Total: $TOTAL | Passed: $((TOTAL - FAILED)) | Failed: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi
